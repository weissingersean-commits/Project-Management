<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Job Manager</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>:root {
  --bg:#EDECEA;--card:#fff;--ink:#111;--ink2:#555;--ink3:#888;--ink4:#bbb;--line:#E0DFDB;
  --accent:#E8A838;--danger:#DC2626;--warn:#D97706;--info:#3B82F6;--ok:#059669;
  --blue:#5B8DEF;--purple:#7B68EE;--orange:#D97B2A;--r:10px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Outfit',sans-serif;background:var(--bg);color:var(--ink);min-height:100vh}
button{font-family:inherit;cursor:pointer} input,select,textarea{font-family:inherit}
::-webkit-scrollbar{width:5px} ::-webkit-scrollbar-thumb{background:#ccc;border-radius:4px}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
.fi{animation:fadeIn .2s ease}
.inp{width:100%;padding:8px 11px;border:1px solid var(--line);border-radius:7px;font-size:14px;outline:none;background:#FAFAF8;box-sizing:border-box}
.inp:focus{border-color:var(--blue)}
.lbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.7px;color:var(--ink3);margin-bottom:3px;display:block}
.req::after{content:" *";color:var(--danger)}
.btn-sm{padding:5px 12px;border:none;border-radius:7px;font-size:12px;font-weight:700}
.btn-dark{background:var(--ink);color:#fff}
.btn-ghost{background:#EFEEEA;color:var(--ink2)}
.btn-outline{background:#fff;border:1px solid var(--line);color:#666}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.full{grid-column:1/-1}
.section-lbl{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:1px;color:var(--ink3);margin:14px 0 6px;display:flex;align-items:center;gap:6px}
.section-lbl .cnt{background:var(--line);border-radius:10px;padding:1px 7px;font-size:9px;color:var(--ink2)}
.badge{font-size:10px;font-weight:700;padding:2px 7px;border-radius:4px;white-space:nowrap}
.hdr{background:var(--ink);color:#fff;padding:18px 20px 14px}
.hdr h1{font-size:22px;font-weight:900;letter-spacing:-.5px}
.hdr-sub{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:2px;color:#666;margin-bottom:2px}
.hdr-row{display:flex;justify-content:space-between;align-items:center}
.btn-add{padding:9px 18px;background:var(--accent);color:var(--ink);border:none;border-radius:9px;font-size:13px;font-weight:800}
.stats{display:flex;gap:16px;margin-top:14px;flex-wrap:wrap}
.stat-v{font-size:24px;font-weight:900}
.stat-l{font-size:9px;font-weight:700;color:#666;text-transform:uppercase;letter-spacing:.5px}
.nav{display:flex;margin-top:12px;gap:2px;flex-wrap:wrap}
.nav button{padding:7px 14px;border:none;border-radius:7px;font-size:12px;font-weight:700;background:transparent;color:#666;transition:background .1s,color .1s}
.nav button.on{background:rgba(255,255,255,.12);color:#fff}
.nav button:hover:not(.on){background:rgba(255,255,255,.06);color:#aaa}
.alert-bar{margin:10px 16px 0;padding:9px 12px;background:#FEF2F2;border:1px solid #FECACA;border-radius:8px;font-size:12px;font-weight:700;color:var(--danger)}
.sbar{padding:10px 16px 0}
.sbar input{width:100%;padding:9px 14px;border:1px solid var(--line);border-radius:9px;font-size:14px;outline:none;background:#fff}
.filts{padding:8px 16px;display:flex;gap:5px;overflow-x:auto}
.fbtn{padding:4px 12px;border-radius:20px;border:none;font-size:11px;font-weight:700;flex-shrink:0;background:#E5E5E0;color:#888}
.fbtn.on{background:var(--ink);color:#fff}
.jlist{padding:0 16px;display:grid;gap:8px}
.jc{background:var(--card);border-radius:var(--r);overflow:hidden;transition:all .15s}
.jc-head{padding:12px 14px;cursor:pointer}
.jc-name{font-size:15px;font-weight:800}
.jc-meta{font-size:12px;color:var(--ink3);margin-top:2px}
.jc-badges{display:flex;align-items:center;gap:6px;margin-top:5px;flex-wrap:wrap}
.jc-counts{font-size:11px;color:var(--ink4);margin-top:4px}
.jc-body{padding:0 14px 14px;border-top:1px solid #F3F3F0}
.jc-notes{font-size:13px;color:var(--ink2);line-height:1.5;margin:10px 0;padding:10px;background:#F8F8F6;border-radius:7px;white-space:pre-wrap}
.ph-row{display:flex;gap:4px;flex-wrap:wrap;margin:10px 0}
.ph-btn{padding:4px 9px;border-radius:6px;font-size:10px;font-weight:700;border:1px solid var(--line);background:#fff;color:#bbb}
.tabs{display:flex;border-bottom:2px solid var(--line);margin-top:4px}
.tab{padding:7px 14px;border:none;border-bottom:2px solid transparent;background:none;font-size:12px;font-weight:700;color:#bbb;margin-bottom:-2px}
.tab.on{border-bottom-color:var(--ink);color:var(--ink)}
.ck{display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid #F3F3F0}
.ck input[type=checkbox]{width:16px;height:16px;accent-color:var(--ok);cursor:pointer}
.ck-t{flex:1;font-size:13px}
.ck-t.done{color:#aaa;text-decoration:line-through}
.ck-x{background:none;border:none;color:var(--ink4);font-size:15px;cursor:pointer}
.pr{display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid #F3F3F0}
.pr-sel{padding:2px 4px;border:1px solid var(--line);border-radius:5px;font-size:10px;font-weight:700;cursor:pointer}
.dr{display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid #F3F3F0}
.dr-dot{width:6px;height:6px;border-radius:3px;flex-shrink:0}
.iform{margin-top:8px;padding:12px;background:#F8F8F6;border:1px solid var(--line);border-radius:8px}
.iform-acts{display:flex;gap:8px;margin-top:10px;justify-content:flex-end}
.mo{position:fixed;inset:0;background:rgba(0,0,0,.45);display:flex;align-items:center;justify-content:center;z-index:1000;padding:16px}
.mo-box{background:#fff;border-radius:14px;width:100%;max-width:520px;max-height:90vh;overflow:auto;padding:24px;box-shadow:0 20px 40px rgba(0,0,0,.2)}
.mo-box h2{font-size:18px;font-weight:800}
.mo-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
.mo-x{background:none;border:none;font-size:22px;color:#999}
.mo-foot{display:flex;gap:10px;margin-top:18px}
.mo-foot button{flex:1;padding:11px;border-radius:10px;font-size:14px;font-weight:600}
.empty{text-align:center;padding:44px 20px;color:#bbb}
.empty-i{font-size:32px;margin-bottom:8px}
.empty-t{font-size:15px;font-weight:700}
.ph-tag{font-size:9px;font-weight:700;padding:1px 5px;border-radius:3px;margin-left:4px}
.acts-row{display:flex;gap:8px;margin-top:14px}
.acts-row button{padding:8px;border-radius:8px;font-size:13px;font-weight:600;border:none;cursor:pointer}
.mat-s{margin-bottom:14px}
.mat-h{font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:1px;margin-bottom:6px}
.mat-c{background:#fff;border-radius:7px;padding:9px 12px;margin-bottom:5px}
.bell-btn{position:relative;background:rgba(255,255,255,.1);border:none;color:#fff;border-radius:8px;padding:7px 9px;font-size:15px;cursor:pointer;line-height:1;transition:background .15s}
.bell-btn:hover{background:rgba(255,255,255,.2)}
.bell-badge{position:absolute;top:-5px;right:-5px;background:#EF4444;color:#fff;border-radius:10px;font-size:9px;font-weight:800;padding:1px 4px;min-width:16px;text-align:center;line-height:14px;pointer-events:none}
.notif-panel{background:#1C1C1C;border-top:1px solid #2E2E2E;padding:10px 16px;max-height:260px;overflow-y:auto}
.notif-item{display:flex;align-items:flex-start;gap:9px;padding:7px 0;border-bottom:1px solid #2A2A2A}
.notif-item:last-child{border-bottom:none}
.notif-dot{width:7px;height:7px;border-radius:4px;margin-top:5px;flex-shrink:0}
.notif-title{font-size:13px;font-weight:700;color:#f0f0f0}
.notif-sub{font-size:11px;color:#888;margin-top:1px}
@media(max-width:600px){.grid2{grid-template-columns:1fr}}
</style>
</head>
<body>
<div id="app"></div>
<script>const PHASES=[
  {id:"design",label:"Design",color:"#5B8DEF"},
  {id:"procurement",label:"Procurement",color:"#E8A838"},
  {id:"build",label:"Build / Assembly",color:"#D97B2A"},
  {id:"install",label:"Install",color:"#7B68EE"},
  {id:"test",label:"Test / Commission",color:"#10B981"},
  {id:"complete",label:"Complete",color:"#059669"},
];

const PHASE_CHECKLISTS={
  design:[
    "Receive and review alarm point list from client",
    "Get engine / machinery specs and manuals",
    "Identify sensor types and ranges needed",
    "Create General Arrangement (GA) drawing",
    "Create wiring diagram / schematics",
    "Submit drawings for client / class approval",
    "Revise drawings per feedback",
    "Final drawing approval received",
  ],
  procurement:[
    "Generate Bill of Materials (BOM) from approved design",
    "Request quotes from suppliers",
    "Issue Purchase Orders",
    "Confirm lead times with suppliers",
    "Track shipments - sensors",
    "Track shipments - panel components",
    "Track shipments - wire / cable",
    "Track shipments - misc hardware",
    "Receive and inspect all materials",
    "Report any damaged or incorrect items",
  ],
  build:[
    "Panel layout and component mounting",
    "Wire panel internals per schematic",
    "Label all wiring and terminals",
    "Program alarm controller / PLC",
    "Bench test - verify each alarm channel",
    "Bench test - verify outputs (horn, lights, shutdown)",
    "QC inspection of completed panel",
    "Prepare panel for shipping / transport",
  ],
  install:[
    "Coordinate vessel availability / dock schedule",
    "Mobilize tools and crew to vessel",
    "Mount alarm panel in engine room / wheelhouse",
    "Run cable and conduit to sensor locations",
    "Install sensors at machinery",
    "Terminate wiring at panel and sensors",
    "Label all field wiring",
    "Verify power supply connections",
  ],
  test:[
    "Power up system - check for faults",
    "Simulate each alarm point - verify annunciation",
    "Test horn silence / acknowledge functions",
    "Test lamp test function",
    "Verify shutdown circuits if applicable",
    "Test wheelhouse remote / repeater panel",
    "Demonstrate system to chief engineer / captain",
    "Complete test report and sign-off sheet",
    "Submit documentation to class society if required",
    "Punch list items - address any deficiencies",
  ],
  complete:[
    "Deliver final as-built drawings to client",
    "Deliver operation and maintenance manual",
    "Submit final invoice",
    "Collect payment",
    "Archive job files",
  ],
};

const PART_STATUSES=[
  {id:"needed",label:"Needed",color:"#DC2626",dot:"\u{1F534}"},
  {id:"ordered",label:"Ordered",color:"#D97706",dot:"\u{1F7E1}"},
  {id:"shipped",label:"Shipped",color:"#3B82F6",dot:"\u{1F535}"},
  {id:"received",label:"Received",color:"#059669",dot:"\u{1F7E2}"},
];

const DOC_STATUSES=[
  {id:"pending",label:"Pending",color:"#D97706"},
  {id:"in_progress",label:"In Progress",color:"#3B82F6"},
  {id:"submitted",label:"Submitted",color:"#7B68EE"},
  {id:"approved",label:"Approved",color:"#059669"},
  {id:"rejected",label:"Rejected",color:"#DC2626"},
];

const DOC_TYPES=["GA Drawing","Wiring Diagram","Spec Sheet","Bill of Materials","Approval Letter","Class Certificate","Test Report","Punch List","Photo / As-Built","Invoice","Purchase Order","Other"];
const VESSEL_TYPES=["Tugboat","Towboat","Push Boat","Barge","Crew Boat","Supply Vessel (OSV)","Ferry","Tanker","Cargo / Freighter","Dredge","Workboat","Yacht","Military","Other"];

const UC={
  overdue:{c:"#DC2626",bg:"#FEF2F2",br:"#FECACA"},
  hot:{c:"#B45309",bg:"#FFFBEB",br:"#FDE68A"},
  soon:{c:"#1D4ED8",bg:"#EFF6FF",br:"#BFDBFE"},
  ok:{c:"#6B7280",bg:"transparent",br:"transparent"},
  done:{c:"#059669",bg:"#F0FDF4",br:"#BBF7D0"},
  none:{c:"#9CA3AF",bg:"transparent",br:"transparent"},
};

function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,7)}

function dL(d){if(!d)return null;const n=new Date();n.setHours(0,0,0,0);return Math.ceil((new Date(d+"T00:00:00")-n)/864e5)}
function urg(due,ph){if(ph==="complete")return"done";const d=dL(due);if(d===null)return"none";if(d<0)return"overdue";if(d<=3)return"hot";if(d<=7)return"soon";return"ok"}
function urgLbl(due,ph){if(ph==="complete")return"Done";const d=dL(due);if(d===null)return"";if(d<0)return Math.abs(d)+"d overdue";if(d===0)return"Today";return d+"d"}

function h(t,a,...c){
  const e=document.createElement(t);
  if(a)for(const[k,v]of Object.entries(a)){
    if(k==="style"&&typeof v==="object")Object.assign(e.style,v);
    else if(k.startsWith("on"))e.addEventListener(k.slice(2).toLowerCase(),v);
    else if(k==="className")e.className=v;
    else if(k==="checked")e.checked=v;
    else if(k==="selected")e.selected=v;
    else if(k==="value")e.value=v;
    else e.setAttribute(k,v);
  }
  for(const x of c){
    if(x==null||x===false)continue;
    if(typeof x==="string"||typeof x==="number")e.appendChild(document.createTextNode(x));
    else if(Array.isArray(x))x.forEach(z=>{if(z)e.appendChild(z)});
    else e.appendChild(x);
  }
  return e;
}

const STORE="mas-pm-v1";
const STORE_OLD="mas-jm-v6";

function defaultSettings(){
  return{
    company:{name:"Marine Alarm Systems",address:"",phone:"",email:""},
    numbering:{quotePrefix:"Q",quoteNext:1,poPrefix:"PO",poNext:1,invPrefix:"INV",invNext:1},
    tax:{rate:0,label:"Tax"},
    currency:"USD",
  };
}

function loadState(){
  try{
    const raw=localStorage.getItem(STORE);
    if(raw)return JSON.parse(raw);
    // migrate from v6
    const old=localStorage.getItem(STORE_OLD);
    if(old){
      const jobs=JSON.parse(old)||[];
      const st={jobs,contacts:[],settings:defaultSettings()};
      localStorage.setItem(STORE,JSON.stringify(st));
      return st;
    }
    return{jobs:[],contacts:[],settings:defaultSettings()};
  }catch{return{jobs:[],contacts:[],settings:defaultSettings()};}
}

function saveState(data){
  localStorage.setItem(STORE,JSON.stringify(data));
}

const _loaded=loadState();

let S={
  jobs:_loaded.jobs||[],
  contacts:_loaded.contacts||[],
  settings:Object.assign(defaultSettings(),_loaded.settings||{}),
  // ui state (not persisted)
  view:"dashboard",
  editing:null,
  filter:"all",
  search:"",
  expanded:{},
  tabs:{},
  addingPart:{},
  editingPart:{},
  partForms:{},
  addingDoc:{},
  docForms:{},
  addingShipment:{},
  editingShipment:{},
  shipmentForms:{},
  showNotifications:false,,
};

function set(p){Object.assign(S,p);render()}
function persist(){saveState({jobs:S.jobs,contacts:S.contacts,settings:S.settings});render()}
function updJob(id,p){S.jobs=S.jobs.map(j=>j.id===id?{...j,...p}:j);persist()}
function delJob(id){S.jobs=S.jobs.filter(j=>j.id!==id);delete S.expanded[id];persist()}

function renderHeader(){
  const{jobs,view}=S;
  const active=jobs.filter(j=>j.phase!=="complete");
  const overdue=active.filter(j=>urg(j.due,j.phase)==="overdue");
  const hot=active.filter(j=>urg(j.due,j.phase)==="hot");
  const allP=jobs.flatMap(j=>(j.parts||[]));
  const pN=allP.filter(p=>p.status==="needed");
  const pL=allP.filter(p=>p.etaDate&&(p.status==="ordered"||p.status==="shipped")&&dL(p.etaDate)<0);
  const allSh=jobs.flatMap(j=>(j.shipments||[]).map(s=>({...s,jobName:j.name})));
  const shLate=allSh.filter(s=>s.etaDate&&s.status==="in_transit"&&dL(s.etaDate)<0);

  const alertCount=overdue.length+shLate.length+pL.length;

  const nav=[
    ["dashboard","Dashboard"],
    ["jobs","Jobs"],
    ["materials","Materials"],
    ["settings","Settings"],
  ];

  const hdr=h("div",{className:"hdr"},
    h("div",{className:"hdr-row"},
      h("div",null,
        h("div",{className:"hdr-sub"},S.settings.company.name||"Marine Alarm Systems"),
        h("h1",null,"Job Manager"),
      ),
      h("div",{style:{display:"flex",gap:"8px",alignItems:"center"}},
        h("button",{className:"bell-btn",onClick:()=>{S.showNotifications=!S.showNotifications;render()},title:"Notifications"},
          "🔔",
          alertCount>0?h("span",{className:"bell-badge"},""+alertCount):null,
        ),
        view!=="settings"?h("button",{className:"btn-add",onClick:()=>set({editing:{},view:"jobs"})},"+ New Job"):null,
      ),
    ),
    h("div",{className:"stats"},
      ...[
        {l:"Active",v:active.length,c:"#5B8DEF"},
        {l:"Overdue",v:overdue.length,c:overdue.length?"#EF4444":"#555"},
        {l:"Parts Needed",v:pN.length,c:pN.length?"#E8A838":"#555"},
        {l:"Parts Late",v:pL.length,c:pL.length?"#EF4444":"#555"},
      ].map(s=>h("div",null,
        h("div",{className:"stat-v",style:{color:s.c}},""+s.v),
        h("div",{className:"stat-l"},s.l),
      )),
    ),
    h("div",{className:"nav"},
      ...nav.map(([id,l])=>h("button",{className:view===id?"on":"",onClick:()=>set({view:id})},l)),
    ),
  );

  if(S.showNotifications){
    const panel=h("div",{className:"notif-panel"});
    const items=[];
    overdue.forEach(j=>items.push({dot:"#EF4444",title:j.name,sub:"Overdue — "+urgLbl(j.due,j.phase)}));
    hot.forEach(j=>items.push({dot:"#F59E0B",title:j.name,sub:"Due soon — "+urgLbl(j.due,j.phase)}));
    shLate.forEach(s=>items.push({dot:"#EF4444",title:s.jobName+" — "+s.name,sub:"Shipment past ETA ("+s.etaDate+")"}));
    pL.forEach(p=>items.push({dot:"#F59E0B",title:p.name||(p.partNumber||"Part"),sub:"Part past ETA — "+urgLbl(p.etaDate)}));

    if(!items.length){
      panel.appendChild(h("div",{style:{color:"#888",fontSize:"13px",padding:"6px 0"}},"✓ All clear — no overdue items"));
    }else{
      items.forEach(it=>{
        const row=h("div",{className:"notif-item"});
        row.appendChild(h("div",{className:"notif-dot",style:{background:it.dot}}));
        const txt=h("div",null);
        txt.appendChild(h("div",{className:"notif-title"},it.title));
        txt.appendChild(h("div",{className:"notif-sub"},it.sub));
        row.appendChild(txt);
        panel.appendChild(row);
      });
    }
    hdr.appendChild(panel);
  }

  return hdr;
}

function renderModal(){
  if(!S.editing)return null;
  const j=S.editing;const isE=!!j.id;
  const ov=h("div",{className:"mo",onClick:e=>{if(e.target===ov)set({editing:null})}});
  const box=h("div",{className:"mo-box fi"});
  box.appendChild(h("div",{className:"mo-hdr"},h("h2",null,isE?"Edit Job":"New Job"),h("button",{className:"mo-x",onClick:()=>set({editing:null})},"×")));
  const frm=h("div",{style:{display:"grid",gap:"10px"}});

  frm.appendChild(h("div",{className:"section-lbl"},"⚓ Vessel & Client"));
  let r=h("div",{className:"grid2"});
  r.appendChild(mkF("Vessel Name","vesselName",j,"M/V Gulf Runner",true));
  r.appendChild(mkSel("Vessel Type","vesselType",j,VESSEL_TYPES.map(v=>({v,l:v})),j.vesselType||"Tugboat"));
  frm.appendChild(r);
  r=h("div",{className:"grid2"});
  r.appendChild(mkF("Client / Company","client",j,"",true));
  r.appendChild(mkF("IMO / Hull #","imo",j,""));
  frm.appendChild(r);

  frm.appendChild(h("div",{className:"section-lbl"},"📋 Job Details"));
  frm.appendChild(mkF("Job / Project Name","name",j,"e.g. Engine Room Alarm Panel Replacement",true));
  const sw=h("div",null);sw.appendChild(h("label",{className:"lbl req"},"Scope of Work"));
  sw.appendChild(h("textarea",{className:"inp",rows:"3",style:{resize:"vertical"},value:j.scope||"",placeholder:"Describe the work: number of alarm points, new install vs retrofit, any special requirements (class society, shutdown circuits, remote panels)...",onInput:e=>{S.editing={...S.editing,scope:e.target.value}}}));
  frm.appendChild(sw);
  r=h("div",{className:"grid2"});
  r.appendChild(mkF("PO / Contract #","poNumber",j,""));
  r.appendChild(mkF("Alarm Point Count","alarmPoints",j,"e.g. 24",false,"number"));
  frm.appendChild(r);
  r=h("div",{className:"grid2"});
  r.appendChild(mkF("Est. Value ($)","value",j,""));
  r.appendChild(mkSel("Starting Phase","phase",j,PHASES.map(p=>({v:p.id,l:p.label})),j.phase||"design"));
  frm.appendChild(r);

  frm.appendChild(h("div",{className:"section-lbl"},"📅 Schedule"));
  r=h("div",{className:"grid2"});
  r.appendChild(mkF("Start Date","startDate",j,"",false,"date"));
  r.appendChild(mkF("Due Date","due",j,"",true,"date"));
  frm.appendChild(r);
  r=h("div",{className:"grid2"});
  r.appendChild(mkF("Dock Date","dockDate",j,"",false,"date"));
  r.appendChild(mkF("Sea Trial Date","seaTrialDate",j,"",false,"date"));
  frm.appendChild(r);

  const nw=h("div",null);nw.appendChild(h("label",{className:"lbl"},"Additional Notes"));
  nw.appendChild(h("textarea",{className:"inp",rows:"2",style:{resize:"vertical"},value:j.notes||"",placeholder:"Special instructions, contacts, location...",onInput:e=>{S.editing={...S.editing,notes:e.target.value}}}));
  frm.appendChild(nw);

function exportData(){
  const data={jobs:S.jobs,contacts:S.contacts,settings:S.settings,exportedAt:new Date().toISOString(),version:"mas-pm-v1"};
  const blob=new Blob([JSON.stringify(data,null,2)],{type:"application/json"});
  const url=URL.createObjectURL(blob);
  const a=document.createElement("a");
  const date=new Date().toISOString().slice(0,10);
  a.href=url;a.download="mas-pm-backup-"+date+".json";a.click();
  URL.revokeObjectURL(url);
}

function importData(e){
  const file=e.target.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=ev=>{
    try{
      const data=JSON.parse(ev.target.result);
      if(!Array.isArray(data.jobs)){alert("Invalid backup file — missing jobs array.");return}
      if(!confirm("This will replace all current data with the backup.\n\n"+data.jobs.length+" jobs found.\nExported: "+(data.exportedAt||"unknown")+"\n\nContinue?"))return;
      S.jobs=data.jobs||[];
      S.contacts=data.contacts||[];
      S.settings=Object.assign(defaultSettings(),data.settings||{});
      persist();
      alert("✓ Import complete: "+S.jobs.length+" jobs loaded.");
    }catch(err){alert("Error reading file. Make sure it is a valid backup JSON.\n\n"+err.message);}
  };
  reader.readAsText(file);
}

    h("div",{style:{fontSize:"14px",fontWeight:"800",marginBottom:"14px"}},"Company Info"),
    h("div",{style:{display:"grid",gap:"10px"}},
      field("Company Name",cfg.company.name,v=>{S.settings.company.name=v}),
      field("Address",cfg.company.address,v=>{S.settings.company.address=v}),
      h("div",{className:"grid2"},
        field("Phone",cfg.company.phone,v=>{S.settings.company.phone=v},"tel"),
        field("Email",cfg.company.email,v=>{S.settings.company.email=v},"email"),
      ),
    ),
    h("div",{style:{marginTop:"14px",display:"flex",justifyContent:"flex-end"}},
      h("button",{className:"btn-sm btn-dark",onClick:()=>{persist();const b=document.getElementById("co-saved");if(b){b.style.opacity="1";setTimeout(()=>{b.style.opacity="0"},1800)}}},"Save"),
      h("span",{id:"co-saved",style:{marginLeft:"10px",fontSize:"12px",color:"var(--ok)",fontWeight:"700",transition:"opacity .4s",opacity:"0"}},"✓ Saved"),
    ),
  );
  wrap.appendChild(coForm);

  // Data management
  const dataRow=(title,desc,ctrl)=>h("div",{style:{display:"flex",alignItems:"center",justifyContent:"space-between",gap:"12px",padding:"12px",background:"#F8F8F6",borderRadius:"8px"}},
    h("div",null,h("div",{style:{fontSize:"13px",fontWeight:"700"}},title),h("div",{style:{fontSize:"12px",color:"#888",marginTop:"2px"}},desc)),
    ctrl,
  );

  const fileInp=h("input",{type:"file",accept:".json",style:{display:"none"},onChange:importData});
  const importLbl=h("label",{style:{cursor:"pointer"}},
    h("span",{className:"btn-sm btn-outline"},"Import JSON"),
    fileInp,
  );

  wrap.appendChild(h("div",{style:{background:"#fff",borderRadius:"10px",padding:"18px",marginBottom:"12px"}},
    h("div",{style:{fontSize:"14px",fontWeight:"800",marginBottom:"14px"}},"Data Management"),
    h("div",{style:{display:"flex",flexDirection:"column",gap:"8px"}},
      dataRow("Export Data","Download all jobs and settings as a JSON backup file",h("button",{className:"btn-sm btn-dark",onClick:exportData},"Export JSON")),
      dataRow("Import Data","Restore from a previously exported JSON backup",importLbl),
    ),
  ));

  // Job stats
  const jobsByPhase=PHASES.map(p=>({phase:p,cnt:S.jobs.filter(j=>j.phase===p.id).length})).filter(x=>x.cnt>0);
  if(S.jobs.length){
    wrap.appendChild(h("div",{style:{background:"#fff",borderRadius:"10px",padding:"18px",marginBottom:"12px"}},
      h("div",{style:{fontSize:"14px",fontWeight:"800",marginBottom:"10px"}},"Overview"),
      h("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:"8px"}},
        ...[
          ["Total Jobs",""+S.jobs.length,"#5B8DEF"],
          ["Active",""+(S.jobs.filter(j=>j.phase!=="complete").length),"#E8A838"],
          ["Complete",""+(S.jobs.filter(j=>j.phase==="complete").length),"#059669"],
        ].map(([l,v,c])=>h("div",{style:{textAlign:"center",padding:"10px",background:"#F8F8F6",borderRadius:"8px"}},
          h("div",{style:{fontSize:"22px",fontWeight:"900",color:c}},v),
          h("div",{style:{fontSize:"10px",fontWeight:"700",color:"#888",textTransform:"uppercase"}},l),
        )),
      ),
    ));
  }

  // Danger zone
  wrap.appendChild(h("div",{style:{background:"#fff",border:"1px solid #FECACA",borderRadius:"10px",padding:"18px"}},
    h("div",{style:{fontSize:"14px",fontWeight:"800",color:"var(--danger)",marginBottom:"10px"}},"Danger Zone"),
    h("div",{style:{display:"flex",alignItems:"center",justifyContent:"space-between",gap:"12px"}},
      h("div",null,
        h("div",{style:{fontSize:"13px",fontWeight:"700"}},"Reset All Data"),
        h("div",{style:{fontSize:"12px",color:"#888",marginTop:"2px"}},"Permanently delete all jobs, contacts, and settings"),
      ),
      h("button",{className:"btn-sm",style:{background:"var(--danger)",color:"#fff",flexShrink:"0"},onClick:()=>{
        if(confirm("This will permanently delete ALL data and cannot be undone.\n\nType DELETE to confirm") !==false){
          S.jobs=[];S.contacts=[];S.settings=defaultSettings();persist();
        }
      }},"Reset All"),
    ),
  ));

  return wrap;
}

function render(){
  const app=document.getElementById("app");app.innerHTML="";
  app.appendChild(renderHeader());

  if(S.view==="dashboard"){
    app.appendChild(renderDashboard());
  }else if(S.view==="jobs"){
    const active=S.jobs.filter(j=>j.phase!=="complete");
    const overdue=active.filter(j=>urg(j.due,j.phase)==="overdue");
    if(overdue.length)app.appendChild(h("div",{className:"alert-bar"},"⚠️ "+overdue.length+" job"+(overdue.length>1?"s":"")+" overdue — "+overdue.map(j=>j.name).join(", ")));
    renderJobsView(app);
  }else if(S.view==="materials"){
    app.appendChild(renderMats());
  }else if(S.view==="settings"){
    app.appendChild(renderSettings());
  }

  app.appendChild(h("div",{style:{height:"40px"}}));
  const modal=renderModal();if(modal)app.appendChild(modal);

  if(S.view==="jobs"&&S.search){
    const si=app.querySelector(".sbar input");
    if(si){si.focus();si.setSelectionRange(S.search.length,S.search.length)}
  }
}
render();

// Browser notifications — once per session, for overdue/hot jobs
(function(){
  if(!("Notification" in window))return;
  if(sessionStorage.getItem("mas-notified"))return;
  const active=S.jobs.filter(j=>j.phase!=="complete");
  const overdue=active.filter(j=>urg(j.due,j.phase)==="overdue");
  const hot=active.filter(j=>urg(j.due,j.phase)==="hot");
  if(!overdue.length&&!hot.length)return;
  const fire=()=>{
    if(Notification.permission!=="granted")return;
    const lines=[];
    if(overdue.length)lines.push(overdue.length+" job"+(overdue.length>1?"s":"")+" overdue: "+overdue.map(j=>j.name).join(", "));
    if(hot.length)lines.push(hot.length+" job"+(hot.length>1?"s":"")+" due soon");
    new Notification("Job Manager",{body:lines.join("\n")});
    sessionStorage.setItem("mas-notified","1");
  };
  if(Notification.permission==="granted"){fire()}
  else if(Notification.permission==="default"){Notification.requestPermission().then(p=>{if(p==="granted")fire()})}
})();

</script>
